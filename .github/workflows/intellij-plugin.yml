name: IntelliJ Plugin

on:
  push:
    branches: [main]
    paths:
      - 'intellij-plugin/**'
      - '.github/workflows/intellij-plugin.yml'
  pull_request:
    paths:
      - 'intellij-plugin/**'
      - '.github/workflows/intellij-plugin.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: intellij-plugin

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # IntelliJ Platform 2024.2 runs on JDK 21, and the build toolchain targets 21.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew buildPlugin --no-configuration-cache

      # No local IDE in CI → verifyPlugin falls back to the pinned build target.
      - name: Verify plugin
        run: ./gradlew verifyPlugin --no-configuration-cache

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: selenium-boot-idea
          path: intellij-plugin/build/distributions/*.zip
          if-no-files-found: error
